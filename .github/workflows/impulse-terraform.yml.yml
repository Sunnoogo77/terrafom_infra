name: "Impulse - Terraform Infra & IAM"

on:
    push:
        branches: ["main", "branch-1", "branch-2"]
        paths:
          - "envs/**"
          - "modules/**"
          - "policies/**"
          - ".github/workflows/**"
    pull_request:
        branches: ["main"]
        paths:
          - "envs/**"
          - "modules/**"
          - "policies/**"
          - ".github/workflows/**"
    workflow_dispatch:
        inputs:
          action:
            description: "Manual action"
            required: true
            default: "apply"
            type: choice
            options:
              - apply
              - destroy

permissions:
  contents: read
  actions: read

concurrency:
  group: terraform-${{ github.ref }}-dev
  cancel-in-progress: true

env:
  TF_VERSION: "1.8.5"
  WORKING_DIR: "envs/dev"
  ENABLE_CODE_SCANNING_UPLOAD: "false"
  TF_BACKEND_RESOURCE_GROUP_NAME: ${{ secrets.TF_BACKEND_RESOURCE_GROUP_NAME }}
  TF_BACKEND_STORAGE_ACCOUNT_NAME: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT_NAME }}
  TF_BACKEND_CONTAINER_NAME: ${{ secrets.TF_BACKEND_CONTAINER_NAME }}
  TF_BACKEND_KEY: ${{ secrets.TF_BACKEND_KEY }}

jobs:
    validate:
        name: "Validation & Lint"
        runs-on: ubuntu-latest

        env:
          # terraform validate needs a value, but we avoid injecting real secrets on PRs.
          # TF_VAR_sql_admin_password: "dummy-for-validate"
          TF_VAR_env: "dev"
          TF_VAR_sql_admin_login: "dummy-sql-admin"
          TF_VAR_frontend_repository_url: "https://example.invalid/repo.git"

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v3
            with:
              terraform_version: ${{ env.TF_VERSION }}

          - name: Terraform fmt
            run: terraform fmt -check -recursive

          - name: Terraform init (backend local)
            working-directory: ${{ env.WORKING_DIR }}
            run: terraform init -backend=false -input=false

          - name: Terraform validate
            working-directory: ${{ env.WORKING_DIR }}
            run: terraform validate

          - name: Run Trivy IaC scan (gating)
            uses: aquasecurity/trivy-action@master
            with:
              scan-type: "config"
              scan-ref: "."
              format: "table"
              severity: "MEDIUM,HIGH,CRITICAL"
              exit-code: "1"


          - name: Setup TFLint
            uses: terraform-linters/setup-tflint@v4
            with:
                tflint_version: latest

          - name: Run TFLint
            run: |
                tflint --init
                tflint --recursive

          - name: Setup Python
            uses: actions/setup-python@v5
            with:
              python-version: "3.11"

          - name: Install Checkov
            run: |
              python -m pip install --upgrade pip
              python -m pip install "checkov==3.2.495"

          - name: Run Checkov (Terraform)
            run: |
              checkov --config-file policies/checkov/.checkov.yaml

    plan:
        name: "Terraform Plan (Dev)"
        needs: validate
        runs-on: ubuntu-latest
        timeout-minutes: 30

        # Avoid failures/leaks on forked PRs (secrets are not provided).
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

        env:
          TF_VAR_sql_admin_password: ${{ secrets.TF_VAR_SQL_ADMIN_PASSWORD }}
          TF_VAR_env: "dev"
          TF_VAR_sql_admin_login: ${{ secrets.TF_VAR_SQL_ADMIN_LOGIN != '' && secrets.TF_VAR_SQL_ADMIN_LOGIN || vars.TF_VAR_SQL_ADMIN_LOGIN }}
          TF_VAR_frontend_repository_url: ${{ secrets.TF_VAR_FRONTEND_REPOSITORY_URL != '' && secrets.TF_VAR_FRONTEND_REPOSITORY_URL || vars.TF_VAR_FRONTEND_REPOSITORY_URL || vars.FRONTEND_REPOSITORY_URL }}
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          TF_IN_AUTOMATION: "true"
          TF_INPUT: "false"

        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v3
            with:
                terraform_version: ${{ env.TF_VERSION }}

          - name: Azure Login
            uses: azure/login@v2
            with:
                creds: ${{ secrets.AZURE_CREDENTIALS }}

          - name: Ensure provider registrations (Microsoft.App)
            shell: bash
            run: |
              set -euo pipefail
              az provider register --namespace Microsoft.App --wait

          - name: Preflight backend config
            shell: bash
            run: |
              set -euo pipefail
              for var in TF_BACKEND_RESOURCE_GROUP_NAME TF_BACKEND_STORAGE_ACCOUNT_NAME TF_BACKEND_CONTAINER_NAME TF_BACKEND_KEY; do
                if [ -z "${!var:-}" ]; then
                  echo "::error::Missing backend config env: $var"
                  exit 1
                fi
              done

          - name: Preflight required TF vars
            shell: bash
            run: |
              set -euo pipefail
              for var in TF_VAR_env TF_VAR_sql_admin_login TF_VAR_frontend_repository_url TF_VAR_sql_admin_password; do
                if [ -z "${!var:-}" ]; then
                  echo "::error::Missing Terraform variable: $var"
                  echo "::error::Expect secrets.TF_VAR_SQL_ADMIN_LOGIN / secrets.TF_VAR_FRONTEND_REPOSITORY_URL or vars.TF_VAR_SQL_ADMIN_LOGIN / vars.TF_VAR_FRONTEND_REPOSITORY_URL (or legacy vars.FRONTEND_REPOSITORY_URL) to be set."
                  exit 1
                fi
              done

          - name: Préflight Azure credentials / subscription
            shell: bash
            env:
              AZ_CREDS: ${{ secrets.AZURE_CREDENTIALS }}
            run: |
              set -euo pipefail
              if [ -z "${AZ_CREDS:-}" ]; then
                echo "::error::AZURE_CREDENTIALS is not set"; exit 1
              fi
              python - <<'PY'
              import json, os, sys
              raw=os.environ["AZ_CREDS"]
              try:
                  data=json.loads(raw)
              except Exception as e:
                  sys.exit(f"AZURE_CREDENTIALS is not valid JSON: {e}")
              required=["clientId","clientSecret","subscriptionId","tenantId"]
              missing=[k for k in required if not data.get(k)]
              if missing:
                  sys.exit("AZURE_CREDENTIALS missing keys: " + ",".join(missing))
              print(f"AZURE_CREDENTIALS tenantId={data['tenantId']} subscriptionId={data['subscriptionId']}")
              PY
                            az account show --query "{id:id, tenantId:tenantId, name:name}" -o json
                            az account list --output table || true
                            LOGIN_SUB=$(az account show --query id -o tsv || true)
                            LOGIN_TENANT=$(az account show --query tenantId -o tsv || true)
                            if [ -z "${LOGIN_SUB}" ] || [ -z "${LOGIN_TENANT}" ]; then
                              echo "::error::Azure CLI context is empty after login"; exit 1
                            fi
                            if [ "${LOGIN_SUB}" != "${ARM_SUBSCRIPTION_ID}" ] || [ "${LOGIN_TENANT}" != "${ARM_TENANT_ID}" ]; then
                              echo "::error::Mismatch between AZURE_CREDENTIALS (tenant/sub) and current az context"
                              echo "::error::Expected subscription=${ARM_SUBSCRIPTION_ID} tenant=${ARM_TENANT_ID}, got subscription=${LOGIN_SUB} tenant=${LOGIN_TENANT}"
                              exit 1
                            fi

          - name: Ensure Terraform state container exists
            shell: bash
            run: |
              set -euo pipefail
              az account set --subscription "${ARM_SUBSCRIPTION_ID}"
              EXISTS="$(az storage container exists \
                --auth-mode login \
                --account-name "${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}" \
                --name "${{ env.TF_BACKEND_CONTAINER_NAME }}" \
                --query exists -o tsv 2>/dev/null || echo false)"

              if [ "${EXISTS}" != "true" ]; then
                az storage container create \
                  --auth-mode login \
                  --account-name "${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}" \
                  --name "${{ env.TF_BACKEND_CONTAINER_NAME }}" \
                  --only-show-errors \
                  --output none
              fi

          - name: Check state lock (lease) status
            shell: bash
            run: |
              set -euo pipefail
              az account set --subscription "${ARM_SUBSCRIPTION_ID}"
              INFO="$(az storage blob show \
                --auth-mode login \
                --account-name "${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}" \
                --container-name "${{ env.TF_BACKEND_CONTAINER_NAME }}" \
                --name "${{ env.TF_BACKEND_KEY }}" \
                -o json 2>/dev/null || echo "{}")"
              LEASE=$(echo "${INFO}" | python - <<'PY'
              import sys, json, datetime
              data=json.loads(sys.stdin.read() or "{}")
              props=data.get("properties") or {}
              lease_state=props.get("lease",{}).get("state") or props.get("leaseState")
              last_modified=props.get("lastModified")
              if lease_state:
                  print(lease_state)
              if last_modified:
                  pass
              PY
              )
                            LAST_MOD=$(echo "${INFO}" | jq -r '.properties.lastModified // empty')
                            if [ "${LEASE:-}" = "leased" ] && [ -n "${LAST_MOD:-}" ]; then
                              AGE_SEC=$(python - <<'PY'
              import sys, datetime
              ts=sys.argv[1]
              dt=datetime.datetime.fromisoformat(ts.replace('Z','+00:00'))
              age=(datetime.datetime.utcnow().replace(tzinfo=datetime.timezone.utc)-dt).total_seconds()
              print(int(age))
              PY
              ${LAST_MOD})
                              echo "State blob lease detected, age=${AGE_SEC}s (lastModified=${LAST_MOD})"
                              if [ "${AGE_SEC}" -gt 1800 ]; then
                                echo "::warning::Lease older than 30 minutes. Consider breaking the lease: az storage blob lease break --auth-mode login --account-name ${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }} --container-name ${{ env.TF_BACKEND_CONTAINER_NAME }} --blob ${{ env.TF_BACKEND_KEY }}"
                              fi
                            fi
          - name: Terraform init (remote backend via Azure AD)
            working-directory: ${{ env.WORKING_DIR }}
            shell: bash
            run: >
              terraform init
              -input=false
              -reconfigure
              -backend-config="resource_group_name=${{ env.TF_BACKEND_RESOURCE_GROUP_NAME }}"
              -backend-config="storage_account_name=${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}"
              -backend-config="container_name=${{ env.TF_BACKEND_CONTAINER_NAME }}"
              -backend-config="key=${{ env.TF_BACKEND_KEY }}"
              -backend-config="use_azuread_auth=true"


          - name: Terraform plan
            working-directory: ${{ env.WORKING_DIR }}
            env:
              TF_LOG: INFO
              TF_LOG_PATH: tf.log
            run: |
              echo "Terraform plan started at $(date -u)"
              terraform plan -input=false -out=tfplan.binary
              echo "Terraform plan finished at $(date -u)"

          - name: Upload Terraform tf.log
            if: always()
            uses: actions/upload-artifact@v4
            with:
              name: terraform-tf-log-dev
              path: ${{ env.WORKING_DIR }}/tf.log

          - name: Export plan to JSON
            working-directory: ${{ env.WORKING_DIR }}
            run: terraform show -json tfplan.binary > tfplan.json


          - name: Upload plan artifact
            uses: actions/upload-artifact@v4
            with:
                name: tfplan-dev
                path: ${{ env.WORKING_DIR }}/tfplan.binary

    security:
        name: "Security Scans (Extra)"
        needs: validate
        runs-on: ubuntu-latest

        permissions:
          contents: read
          actions: read
          security-events: write

        steps:
          - name: Checkout
            uses: actions/checkout@v4

        # Trivy en mode IaC (optionnel, redondant avec Checkov mais possible)
          - name: Run Trivy IaC scan
            uses: aquasecurity/trivy-action@master
            with:
                scan-type: "config"
                scan-ref: "."
                format: "sarif"
                output: "trivy-results.sarif"

          - name: Upload Trivy SARIF
            if: env.ENABLE_CODE_SCANNING_UPLOAD == 'true'
            uses: github/codeql-action/upload-sarif@v4
            with:
              sarif_file: "trivy-results.sarif"

          - name: Upload Trivy SARIF artifact
            if: always()
            uses: actions/upload-artifact@v4
            with:
              name: trivy-sarif
              path: trivy-results.sarif

          - name: Trufflehog Secret Scan
            uses: trufflesecurity/trufflehog@main
            with:
              path: .
              extra_args: --only-verified

    apply:
      name: "Terraform Apply (Manual)"
      needs: [plan, security]
      runs-on: ubuntu-latest

      # Sécurité : déclenchement MANUEL uniquement (action=apply)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'

      # Protection via GitHub Environments (approbation possible)
      environment: dev

      env:
        TF_VAR_sql_admin_password: ${{ secrets.TF_VAR_SQL_ADMIN_PASSWORD }}
        ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
        ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
        ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
        ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

      steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v3
            with:
              terraform_version: ${{ env.TF_VERSION }}

          - name: Azure Login
            uses: azure/login@v2
            with:
              creds: ${{ secrets.AZURE_CREDENTIALS }}

          - name: Verify Azure subscription access
            shell: bash
            run: |
              set -euo pipefail
              az account show --query "{id:id, tenantId:tenantId, name:name}" -o json
              az account list --output table || true
              LOGIN_SUB=$(az account show --query id -o tsv || true)
              LOGIN_TENANT=$(az account show --query tenantId -o tsv || true)
              if [ -z "${LOGIN_SUB}" ] || [ -z "${LOGIN_TENANT}" ]; then
                echo "::error::Azure CLI context is empty after login"; exit 1
              fi
              if [ "${LOGIN_SUB}" != "${ARM_SUBSCRIPTION_ID}" ] || [ "${LOGIN_TENANT}" != "${ARM_TENANT_ID}" ]; then
                echo "::error::Mismatch between AZURE_CREDENTIALS (tenant/sub) and current az context"
                echo "::error::Expected subscription=${ARM_SUBSCRIPTION_ID} tenant=${ARM_TENANT_ID}, got subscription=${LOGIN_SUB} tenant=${LOGIN_TENANT}"
                exit 1
              fi

          - name: Ensure Terraform state container exists
            shell: bash
            run: |
              set -euo pipefail
              az account set --subscription "${ARM_SUBSCRIPTION_ID}"
              EXISTS="$(az storage container exists \
                --auth-mode login \
                --account-name "${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}" \
                --name "${{ env.TF_BACKEND_CONTAINER_NAME }}" \
                --query exists -o tsv 2>/dev/null || echo false)"

              if [ "${EXISTS}" != "true" ]; then
                az storage container create \
                  --auth-mode login \
                  --account-name "${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}" \
                  --name "${{ env.TF_BACKEND_CONTAINER_NAME }}" \
                  --only-show-errors \
                  --output none
              fi

          - name: Download Terraform plan
            uses: actions/download-artifact@v4
            with:
              name: tfplan-dev
              path: ${{ env.WORKING_DIR }}

          - name: Terraform init (remote backend via Azure AD)
            working-directory: ${{ env.WORKING_DIR }}
            shell: bash
            run: >
              terraform init
              -input=false
              -reconfigure
              -backend-config="resource_group_name=${{ env.TF_BACKEND_RESOURCE_GROUP_NAME }}"
              -backend-config="storage_account_name=${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}"
              -backend-config="container_name=${{ env.TF_BACKEND_CONTAINER_NAME }}"
              -backend-config="key=${{ env.TF_BACKEND_KEY }}"
              -backend-config="use_azuread_auth=true"

          - name: Terraform apply (approved plan)
            working-directory: ${{ env.WORKING_DIR }}
            run: terraform apply -auto-approve tfplan.binary

    destroy:

      name: "Terraform Destroy (Manual)"
      runs-on: ubuntu-latest

      # Déclenchement manuel uniquement (action=destroy)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

      environment: dev

      env:
        TF_VAR_sql_admin_password: ${{ secrets.TF_VAR_SQL_ADMIN_PASSWORD }}
        ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
        ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
        ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
        ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: ${{ env.TF_VERSION }}

        - name: Azure Login
          uses: azure/login@v2
          with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}

        - name: Verify Azure subscription access
          shell: bash
          run: |
            set -euo pipefail
            az account show --query "{id:id, tenantId:tenantId, name:name}" -o json
            az account list --output table || true
            LOGIN_SUB=$(az account show --query id -o tsv || true)
            LOGIN_TENANT=$(az account show --query tenantId -o tsv || true)
            if [ -z "${LOGIN_SUB}" ] || [ -z "${LOGIN_TENANT}" ]; then
              echo "::error::Azure CLI context is empty after login"; exit 1
            fi
            if [ "${LOGIN_SUB}" != "${ARM_SUBSCRIPTION_ID}" ] || [ "${LOGIN_TENANT}" != "${ARM_TENANT_ID}" ]; then
              echo "::error::Mismatch between AZURE_CREDENTIALS (tenant/sub) and current az context"
              echo "::error::Expected subscription=${ARM_SUBSCRIPTION_ID} tenant=${ARM_TENANT_ID}, got subscription=${LOGIN_SUB} tenant=${LOGIN_TENANT}"
              exit 1
            fi

        - name: Ensure Terraform state container exists
          shell: bash
          run: |
            set -euo pipefail
            az account set --subscription "${ARM_SUBSCRIPTION_ID}"
            EXISTS="$(az storage container exists \
              --auth-mode login \
              --account-name "${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}" \
              --name "${{ env.TF_BACKEND_CONTAINER_NAME }}" \
              --query exists -o tsv 2>/dev/null || echo false)"

            if [ "${EXISTS}" != "true" ]; then
              az storage container create \
                --auth-mode login \
                --account-name "${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}" \
                --name "${{ env.TF_BACKEND_CONTAINER_NAME }}" \
                --only-show-errors \
                --output none
            fi

        - name: Terraform init (remote backend via Azure AD)
          working-directory: ${{ env.WORKING_DIR }}
          shell: bash
          run: >
            terraform init
            -input=false
            -reconfigure
            -backend-config="resource_group_name=${{ env.TF_BACKEND_RESOURCE_GROUP_NAME }}"
            -backend-config="storage_account_name=${{ env.TF_BACKEND_STORAGE_ACCOUNT_NAME }}"
            -backend-config="container_name=${{ env.TF_BACKEND_CONTAINER_NAME }}"
            -backend-config="key=${{ env.TF_BACKEND_KEY }}"
            -backend-config="use_azuread_auth=true"

        - name: Terraform destroy
          working-directory: ${{ env.WORKING_DIR }}
          run: terraform destroy -auto-approve

